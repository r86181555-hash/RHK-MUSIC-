<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Upload Reel - RHK</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script type="module" src="uploadreel.js"></script>

</head>

<body>

<div class="app">

<header class="topbar">

<a href="reels.html">

<i class="fa-solid fa-arrow-left icon"></i>

</a>

<div class="logo">

New Reel

</div>

<button id="uploadBtn">

Share

</button>

</header>

<div class="uploadReelContainer">

<label class="uploadBox">

<input

type="file"

id="video"

accept="video/*"

hidden>

<div id="previewArea">

<i class="fa-solid fa-video"></i>

<p>Select a Reel</p>

</div>

</label>

<video

id="preview"

controls

style="
width:100%;
display:none;
border-radius:12px;
margin-top:20px;
">

</video>

<textarea

id="caption"

placeholder="Write a caption..."

></textarea>

<p id="status"></p>

</div>

</div>

</body>

</html>
