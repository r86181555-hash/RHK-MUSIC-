<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RHK - Upload Reel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="upload-container">
        <h2>Upload Short Vertical Reel</h2>
        <input type="file" id="reel-video-file" accept="video/*" required>
        <input type="text" id="reel-description" placeholder="Write viral tags & description...">
        <button id="upload-reel-btn">Publish Reel</button>
    </div>
    <script type="module" src="uploadreel.js"></script>
</body>
</html>
