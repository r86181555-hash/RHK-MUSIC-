<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK - Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-wrapper">
        <aside class="chat-sidebar">
            <h3>Active Chats</h3>
            <div id="users-list">Global Rooms / Users Loading...</div>
        </aside>
        <main class="chat-main-area">
            <div id="chat-messages-box" class="messages-display"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-message-input" placeholder="Type a message safely...">
                <button id="chat-send-btn">Send</button>
            </div>
        </main>
    </div>
    <script type="module" src="chat.js"></script>
</body>
</html>
