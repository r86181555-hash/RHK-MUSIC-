<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RHK Admin Panel</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script type="module" src="admin.js"></script>

</head>

<body>

<div class="app">

<header class="topbar">

<h2>RHK Admin</h2>

</header>

<div class="dashboard">

<div class="statCard">

<h1 id="usersCount">0</h1>

<p>Users</p>

</div>

<div class="statCard">

<h1 id="postsCount">0</h1>

<p>Posts</p>

</div>

<div class="statCard">

<h1 id="reelsCount">0</h1>

<p>Reels</p>

</div>

<div class="statCard">

<h1 id="storiesCount">0</h1>

<p>Stories</p>

</div>

</div>

<div class="adminSection">

<h3>Users</h3>

<div id="usersList"></div>

</div>

<div class="adminSection">

<h3>Posts</h3>

<div id="postsList"></div>

</div>

<div class="adminSection">

<h3>Reels</h3>

<div id="reelsList"></div>

</div>

</div>

</body>

</html>
