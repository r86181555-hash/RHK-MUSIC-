<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK - Home Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>RHK</h1>
        <div class="nav-links">
            <a href="home.html" class="active">Home</a>
            <a href="chat.html">Messages</a>
            <a href="reels.html">Reels</a>
            <a href="profile.html">Profile</a>
            <button id="logout-btn">Logout</button>
        </div>
    </nav>

    <main class="feed-layout">
        <section class="feed-left">
            <!-- Create Post Field -->
            <div class="create-post-card">
                <textarea id="post-caption" placeholder="What's on your mind?"></textarea>
                <input type="file" id="post-media" accept="image/*,video/*">
                <button id="submit-post-btn">Post to RHK</button>
            </div>

            <!-- Main Timeline Stream -->
            <div id="timeline-feed">Loading posts...</div>
        </section>
    </main>

    <script type="module" src="home.js"></script>
</body>
</html>
