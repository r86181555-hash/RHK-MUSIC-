<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RHK Profile</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script type="module" src="profile.js"></script>

</head>

<body>

<div class="app">

<!-- HEADER -->

<header class="topbar">

<div class="logo">

Profile

</div>

<div style="display:flex;gap:20px;">

<a href="settings.html">

<i class="fa-solid fa-bars icon"></i>

</a>

</div>

</header>

<!-- PROFILE -->

<div class="profileHeader">

<div class="profileTop">

<img
id="profileImage"
class="profilePic"
src="defaultdp.png">

<div class="profileStats">

<div>

<h3 id="postCount">0</h3>

<span>Posts</span>

</div>

<div>

<h3 id="followers">0</h3>

<span>Followers</span>

</div>

<div>

<h3 id="following">0</h3>

<span>Following</span>

</div>

</div>

</div>

<div class="profileBio">

<h2 id="username">

Username

</h2>

<p id="bio">

No bio yet.

</p>

</div>

<button
class="editProfileBtn"
id="editProfile">

Edit Profile

</button>

<input
type="file"
id="dpInput"
accept="image/*"
hidden>

</div>

<!-- POSTS -->

<div
class="profileGrid"
id="profilePosts">

</div>

<!-- NAVIGATION -->

<nav class="bottom">

<a href="home.html">

<i class="fa-solid fa-house"></i>

</a>

<a href="search.html">

<i class="fa-solid fa-magnifying-glass"></i>

</a>

<a href="upload.html">

<i class="fa-regular fa-square-plus"></i>

</a>

<a href="reels.html">

<i class="fa-solid fa-clapperboard"></i>

</a>

<a href="profile.html">

<i class="fa-solid fa-circle-user"></i>

</a>

</nav>

</div>

</body>

</html>
